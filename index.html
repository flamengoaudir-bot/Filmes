<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 Meus Filmes</title>

<style>
body {margin:0;font-family:Arial;background:#111;color:#fff;}
header {padding:15px;font-size:22px;font-weight:bold;}
.grid {display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.card {background:#222;border-radius:10px;overflow:hidden;cursor:pointer;}
.card img {width:100%;pointer-events:none;}
.card h3 {padding:5px;font-size:14px;}

#modal {
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:none;
padding:20px;
overflow:auto;
z-index:999;
}

button {padding:10px;border:none;border-radius:8px;margin-top:10px;}
</style>
</head>

<body>

<header>🎬 Meus Filmes</header>

<div id="grid" class="grid"></div>
<div id="modal"></div>

<script>

const filmes = [
{
nome:"Magnólia (1999)",
nota:8.5,
poster:"https://image.tmdb.org/t/p/w500/7D430eqZj8y3oVkLFfsWXGRcpEG.jpg",
curiosidades:"Tom Cruise teve uma das melhores atuações da carreira. Filme famoso pela chuva de sapos."
},
{
nome:"Era Uma Vez em Hollywood (2019)",
nota:8.0,
poster:"https://image.tmdb.org/t/p/w500/8j58iEBw9pOXFD2L0nt0ZXeHviB.jpg",
curiosidades:"Brad Pitt ganhou Oscar. Recriação perfeita de 1969."
},
{
nome:"Anaconda (2025)",
nota:3.5,
poster:"https://image.tmdb.org/t/p/w500/8K9.jpg",
curiosidades:"Comédia metalinguística com Jack Black."
}
];

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  filmes.forEach((f, i)=>{
    const card = document.createElement("div");
    card.className="card";

    card.onclick = () => abrir(i);

    card.innerHTML = `
      <img src="${f.poster}">
      <h3>${f.nome} ⭐ ${f.nota}</h3>
    `;

    grid.appendChild(card);
  });
}

function abrir(i){
  const f = filmes[i];
  const modal = document.getElementById("modal");

  modal.style.display="block";
  modal.innerHTML = `
    <h2>${f.nome}</h2>
    <img src="${f.poster}" style="width:100%">
    <p><b>Nota:</b> ${f.nota}</p>
    <p>${f.curiosidades}</p>
    <button onclick="fechar()">Fechar</button>
  `;
}

function fechar(){
  document.getElementById("modal").style.display="none";
}

render();

</script>

</body>
</html>
